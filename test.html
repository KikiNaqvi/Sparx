<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Network Info</title>

<style>
body{
    font-family: system-ui, Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.panel{
    background:#111827;
    padding:30px;
    border-radius:12px;
    width:420px;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
    margin-top:0;
    font-size:22px;
}

.info{
    margin:6px 0;
    font-size:14px;
}

.label{
    color:#9ca3af;
}

.value{
    color:#22c55e;
    font-weight:600;
}
</style>
</head>

<body>

<div class="panel">
<h1>🌐 Your Network Info</h1>

<div class="info"><span class="label">IP Address:</span> <span id="ip" class="value">Loading...</span></div>
<div class="info"><span class="label">City:</span> <span id="city" class="value"></span></div>
<div class="info"><span class="label">Region:</span> <span id="region" class="value"></span></div>
<div class="info"><span class="label">Country:</span> <span id="country" class="value"></span></div>
<div class="info"><span class="label">Timezone:</span> <span id="timezone" class="value"></span></div>
<div class="info"><span class="label">ISP:</span> <span id="isp" class="value"></span></div>
<div class="info"><span class="label">Coordinates:</span> <span id="coords" class="value"></span></div>

<hr style="margin:20px 0;border-color:#1f2937">

<h1>💻 Device Info</h1>

<div class="info"><span class="label">Browser:</span> <span id="browser" class="value"></span></div>
<div class="info"><span class="label">OS:</span> <span id="os" class="value"></span></div>
<div class="info"><span class="label">Language:</span> <span id="lang" class="value"></span></div>
<div class="info"><span class="label">Screen:</span> <span id="screen" class="value"></span></div>
<div class="info"><span class="label">CPU Cores:</span> <span id="cores" class="value"></span></div>

</div>

<script>

async function getIPInfo(){

    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    document.getElementById("ip").textContent = data.ip;
    document.getElementById("city").textContent = data.city;
    document.getElementById("region").textContent = data.region;
    document.getElementById("country").textContent = data.country_name;
    document.getElementById("timezone").textContent = data.timezone;
    document.getElementById("isp").textContent = data.org;
    document.getElementById("coords").textContent = data.latitude + ", " + data.longitude;

}

function getDeviceInfo(){

    document.getElementById("browser").textContent = navigator.userAgent;
    document.getElementById("os").textContent = navigator.platform;
    document.getElementById("lang").textContent = navigator.language;
    document.getElementById("screen").textContent = screen.width + " x " + screen.height;
    document.getElementById("cores").textContent = navigator.hardwareConcurrency || "Unknown";

}

getIPInfo();
getDeviceInfo();

</script>

</body>
</html>
